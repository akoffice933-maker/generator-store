name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://readonly:readonly@127.0.0.1:5432/generator_store
      AUTH_SECRET: ci-only-secret-that-is-longer-than-thirty-two-characters
      NEXT_PUBLIC_APP_URL: https://example.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

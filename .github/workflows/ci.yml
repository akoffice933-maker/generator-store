name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://readonly:readonly@127.0.0.1:5432/generator_store
      AUTH_SECRET: ci-only-secret-that-is-longer-than-thirty-two-characters
      NEXT_PUBLIC_APP_URL: https://example.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: generator_store
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d generator_store"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/generator_store
      AUTH_SECRET: ci-only-secret-that-is-longer-than-thirty-two-characters
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      REDIS_URL: redis://127.0.0.1:6379
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:e2e:install
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run test:e2e:setup
      - run: npm run build
      - run: nohup npm run worker > worker.log 2>&1 &
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            worker.log
          retention-days: 7
